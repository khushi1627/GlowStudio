<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" routerLink="/">GlowStudio</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/offers" routerLinkActive="active">Offers</a>
      <a routerLink="/about" routerLinkActive="active">About Us</a>
      <a routerLink="/contact" routerLinkActive="active">Contact Us</a>
      @if (!auth.user()) {
        <a routerLink="/login" routerLinkActive="active">Login</a>
      } @else {
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      }
    </nav>
  </div>
</header>

<main>
  <router-outlet />
</main>

<footer class="site-footer">
  <div class="container footer-wrap">
    <p>© 2026 GlowStudio. All rights reserved.</p>
    <p>120 Rose Avenue, Los Angeles, CA</p>
  </div>
</footer>
